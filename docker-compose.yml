version: '3.8'

services:
  # 1. Добавляем сервис базы данных PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: role_bot_db
    restart: always
    environment:
      POSTGRES_USER: role_user
      POSTGRES_PASSWORD: role_secure_password_12345
      POSTGRES_DB: triumphroll_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. Обновляем сервис бэкенда
  backend:
    build: ./backend
    container_name: role_bot_backend
    restart: always
    # Указываем, что бэкенд запускается только после старта базы данных
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://role_user:role_secure_password_12345@db:5432/triumphroll_db
      - PYTHONIOENCODING=utf-8
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8 
    ports:
      - "8001:8000"

  # 3. Сервис фронтенда (оставьте его настройки без изменений)
  frontend:
    build: ./frontend
    container_name: role_bot_frontend
    restart: always
    ports:
      - "5173:5173"

# Объявляем именованный том для сохранения данных БД на диске
volumes:
  pgdata: