version: '3.8'

services:
  backend:
    build: ./backend
    container_name: role_bot_backend
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - SYS_DB_PATH=/app/data/system_health.db
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build: ./frontend
    container_name: role_bot_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped
    command: npm run dev -- --host
    depends_on:
      - backend