services:
  backend:
    build: ./backend
    container_name: role_bot_backend
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - SYS_DB_PATH=/app/data/system_health.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: role_bot_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    restart: unless-stopped
