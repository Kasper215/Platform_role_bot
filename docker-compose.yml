services:
  backend:
    build: ./backend
    container_name: role_bot_backend
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
      - backend_data:/app/app/static/avatars
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: role_bot_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
